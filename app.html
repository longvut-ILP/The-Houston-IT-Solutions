<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Polished POS — Salon</title>
<script>
  /* =====================================================================
     SET YOUR API URL HERE after deploying the backend (DEPLOY.md, Part 3).
     Local dev default is http://localhost:4000.
     Example: window.__SALON_API__ = "https://salon-pos-api.up.railway.app";
     ===================================================================== */
  window.__SALON_API__ = "https://salon-pos-api.vercel.app";

  // Show errors on the page instead of a blank screen.
  window.addEventListener("error", function (e) {
    var r = document.getElementById("root");
    if (r && !r.getAttribute("data-ok")) {
      r.innerHTML = '<div style="padding:20px;font:13px/1.6 system-ui;color:#b91c1c">' +
        "<b>App error</b><pre style=\"white-space:pre-wrap\">" +
        ((e && (e.message || e.error)) || "Unknown error") +
        "</pre><p style=\"color:#6b7280\">Needs internet to load React &amp; Tailwind. If it mentions fetch/CORS, check window.__SALON_API__ and the API's CORS_ORIGIN.</p></div>";
    }
  });
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div id="root" style="min-height:100vh"><div style="padding:20px;font:14px system-ui;color:#6b7280">Loading…</div></div>

<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect } = React;

// ---- emoji icon shims (stand in for lucide-react) ----
const ICONS = { Scissors:"✂️", Calendar:"📅", ShoppingCart:"🛒", LayoutDashboard:"📊",
  Settings:"⚙️", DollarSign:"💲", CreditCard:"💳", Banknote:"💵", Package:"📦", Clock:"⏱️",
  CheckCircle2:"✅", AlertTriangle:"⚠️", UserPlus:"➕", Building2:"🏢", FileSpreadsheet:"📄",
  Users:"👥", Coins:"🪙", Download:"⬇️", RefreshCw:"🔄", WifiOff:"📡", LogOut:"🚪", Lock:"🔒" };
const mk = (g) => ({ size = 14, className = "" }) => <span className={className} style={{ fontSize: (size||14)+"px", lineHeight: 1 }}>{g}</span>;
const Scissors=mk(ICONS.Scissors), Calendar=mk(ICONS.Calendar), ShoppingCart=mk(ICONS.ShoppingCart),
  LayoutDashboard=mk(ICONS.LayoutDashboard), Settings=mk(ICONS.Settings), Package=mk(ICONS.Package),
  CreditCard=mk(ICONS.CreditCard), Banknote=mk(ICONS.Banknote), AlertTriangle=mk(ICONS.AlertTriangle),
  CheckCircle2=mk(ICONS.CheckCircle2), Clock=mk(ICONS.Clock), UserPlus=mk(ICONS.UserPlus),
  Building2=mk(ICONS.Building2), DollarSign=mk(ICONS.DollarSign), FileSpreadsheet=mk(ICONS.FileSpreadsheet),
  Users=mk(ICONS.Users), Coins=mk(ICONS.Coins), Download=mk(ICONS.Download), RefreshCw=mk(ICONS.RefreshCw),
  WifiOff=mk(ICONS.WifiOff), LogOut=mk(ICONS.LogOut), Lock=mk(ICONS.Lock);

// ---- API client (real fetch, JWT + refresh; port of salonApi.js) ----
const API_BASE = (typeof window !== "undefined" && window.__SALON_API__) || "http://localhost:4000";
let _token = null, _refresh = null, _salonId = null, _user = null, _refreshing = null, _cal = null;
function setSession({ token, refreshToken, staff }) { _token = token; if (refreshToken) _refresh = refreshToken; if (staff) { _salonId = staff.salonId; _user = staff; } }
function clearSession() { _token = null; _refresh = null; _salonId = null; _user = null; }
const getSalonId = () => _salonId;
const localToday = () => new Date().toISOString().slice(0, 10);
function localWeekStart(date = new Date()) { const d = new Date(date); const diff = (d.getDay() + 6) % 7; d.setDate(d.getDate() - diff); return d.toISOString().slice(0, 10); }
async function doRefresh() {
  if (!_refresh) throw new Error("no refresh token");
  if (!_refreshing) {
    _refreshing = fetch(`${API_BASE}/auth/refresh`, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ refreshToken: _refresh }) })
      .then(async (res) => { if (!res.ok) { clearSession(); throw new Error("refresh failed"); } setSession(await res.json()); })
      .finally(() => { _refreshing = null; });
  }
  return _refreshing;
}
async function request(path, options = {}, retried = false) {
  const headers = { "content-type": "application/json", ...(options.headers || {}) };
  if (_token) headers.authorization = `Bearer ${_token}`;
  const res = await fetch(`${API_BASE}${path}`, { ...options, headers });
  if (res.status === 401 && _refresh && !retried && !path.startsWith("/auth/")) {
    try { await doRefresh(); return request(path, options, true); } catch { clearSession(); }
  }
  if (!res.ok) {
    let detail = "";
    try { const body = await res.json(); detail = body.message || body.error || JSON.stringify(body); } catch { detail = res.statusText; }
    const err = new Error(`${res.status} ${detail}`); err.status = res.status; throw err;
  }
  if (res.status === 204) return null;
  return res.json();
}
async function login(email, password) { const r = await request(`/auth/login`, { method: "POST", body: JSON.stringify({ email, password }) }); setSession(r); return r.staff; }
async function registerSalon(body) { const r = await request(`/auth/register-salon`, { method: "POST", body: JSON.stringify(body) }); setSession(r); return r.staff; }
async function logout() { try { if (_refresh) { await fetch(`${API_BASE}/auth/logout`, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ refreshToken: _refresh }) }); } } catch {} clearSession(); }
const me = () => request(`/auth/me`);
async function loadCalendar() { _cal = await request(`/salons/${getSalonId()}/calendar`); return _cal; }
const today = () => (_cal && _cal.today) || localToday();
const weekStart = () => (_cal && _cal.weekStart) || localWeekStart();
const getSettings = (salonId = getSalonId()) => request(`/salons/${salonId}/settings`);
const getStaff = (salonId = getSalonId()) => request(`/salons/${salonId}/staff`);
const getAppointments = (date, salonId = getSalonId()) => request(`/salons/${salonId}/appointments?date=${date}`);
const getTickets = (date, salonId = getSalonId()) => request(`/salons/${salonId}/tickets?date=${date}`);
const getPayroll = (start, techId, salonId = getSalonId()) => request(`/payroll/workweek?salonId=${salonId}&start=${start}` + (techId ? `&techId=${techId}` : ""));
const getTipPool = (date, salonId = getSalonId()) => request(`/tip-pool?salonId=${salonId}&date=${date}`);
const commitPayroll = (start) => request(`/payroll/commit`, { method: "POST", body: JSON.stringify({ start }) });
const commitTipPool = (date) => request(`/tip-pool/commit`, { method: "POST", body: JSON.stringify({ date }) });
const putSettings = (config, salonId = getSalonId()) => request(`/salons/${salonId}/settings`, { method: "PUT", body: JSON.stringify(config) });
const updateStaffComp = (staffId, body) => request(`/staff/${staffId}/comp`, { method: "PATCH", body: JSON.stringify({ salonId: getSalonId(), ...body }) });
const createStaff = (body) => request(`/staff`, { method: "POST", body: JSON.stringify({ salonId: getSalonId(), ...body }) });
const setStaffPassword = (staffId, password) => request(`/staff/${staffId}/credential`, { method: "POST", body: JSON.stringify({ password }) });
const createAppointment = (body) => request(`/appointments`, { method: "POST", body: JSON.stringify({ salonId: getSalonId(), ...body }) });
const checkout = (body) => request(`/checkout`, { method: "POST", body: JSON.stringify(body) });
const clockIn = (techId) => request(`/time-clock/in`, { method: "POST", body: JSON.stringify(techId ? { techId } : {}) });
const clockOut = (techId) => request(`/time-clock/out`, { method: "POST", body: JSON.stringify(techId ? { techId } : {}) });
const clockStatus = (techId, date) => { const p = new URLSearchParams(); if (techId) p.set("techId", techId); if (date) p.set("date", date); return request(`/time-clock/status?${p.toString()}`); };
const api = { API_BASE, login, registerSalon, logout, me, loadCalendar, today, weekStart, todayISO: today, workweekStart: weekStart,
  getSettings, getStaff, getAppointments, getTickets, getPayroll, getTipPool, commitPayroll, commitTipPool,
  putSettings, updateStaffComp, createStaff, setStaffPassword, createAppointment, checkout, clockIn, clockOut, clockStatus };

// ---- engine mirror (matches src/lib/commissionEngine.ts) ------------------
const applyBps = (cents, bps) => Math.round((cents * bps) / 10000);
const cardFee = (cents, cfg) => cents <= 0 ? 0 : applyBps(cents, cfg.ccFeePctBps) + cfg.ccFeeFixedCents;
function computeW2Ticket(t, tech, cfg) {
  const ccFeeOnService = cardFee(t.service, cfg);
  const productCost = applyBps(t.service, cfg.productCostPctBps);
  const netService = Math.max(0, t.service - ccFeeOnService - productCost);
  const serviceCommission = applyBps(netService, tech.serviceCommissionBps);
  const retailCommission = applyBps(t.retail, tech.retailCommissionBps);
  const commissionWages = serviceCommission + retailCommission;
  return { ccFeeOnService, productCost, netService, serviceCommission, retailCommission, commissionWages, cardTip: t.ccTip, cashTip: t.cashTip, techTakeHome: commissionWages + t.ccTip + t.cashTip };
}
function computeRenterPayout(t, cfg) {
  const routable = t.service + t.ccTip; const fee = cardFee(routable, cfg);
  return { instantPayout: Math.max(0, routable - fee), cardFee: fee, cashTip: t.cashTip, salonRetail: t.retail };
}
const fmt = (c) => { const s = c < 0 ? "-" : ""; const v = Math.abs(c || 0); return `${s}$${Math.floor(v / 100).toLocaleString()}.${String(v % 100).padStart(2, "0")}`; };
const pct = (bps) => `${(bps / 100).toFixed(bps % 100 ? 2 : 0)}%`;

// ---- API shape adapters ---------------------------------------------------
const SLOTS = ["9:00", "9:30", "10:00", "10:30", "11:00", "11:30", "12:00", "12:30", "1:00", "1:30", "2:00", "2:30", "3:00", "3:30"];
const STATUS = {
  done: { tone: "green", label: "Checked out", icon: CheckCircle2, cell: "border-green-200 bg-green-50" },
  in_chair: { tone: "amber", label: "In chair", icon: Clock, cell: "border-amber-200 bg-amber-50" },
  booked: { tone: "blue", label: "Booked", icon: Calendar, cell: "border-blue-200 bg-blue-50" },
};
const ST = { BOOKED: "booked", IN_CHAIR: "in_chair", DONE: "done", CANCELLED: "cancelled", NO_SHOW: "no_show" };
function toSlot(iso) { const d = new Date(iso); const h = d.getHours(); const m = d.getMinutes() < 30 ? "00" : "30"; const h12 = h > 12 ? h - 12 : h; return `${h12}:${m}`; }
function slotToISO(slot, dateISO) { const [hStr, mStr] = slot.split(":"); let h = parseInt(hStr, 10); const m = parseInt(mStr, 10); if (h >= 1 && h <= 8) h += 12; const d = new Date(`${dateISO}T00:00:00`); d.setHours(h, m, 0, 0); return d.toISOString(); }
function adaptAppt(row) { return { id: row.id, techId: row.tech_id, client: row.client_label || "Client", service: row.service_desc || "", status: ST[row.status] || "booked", time: toSlot(row.starts_at) }; }
const flsaView = (wp) => wp ? { hours: wp.hoursWorked, commission: wp.commissionWagesCents, floor: wp.flsa.minWageFloorCents, topUp: wp.flsa.minWageTopUpCents, otHours: wp.flsa.overtimeHours, otPremium: wp.flsa.overtimePremiumCents, rate: wp.flsa.regularRateCentsPerHour, gross: wp.flsa.grossPayCents } : null;

// ---- small UI atoms -------------------------------------------------------
const Card = ({ children, className = "" }) => (<div className={`rounded-2xl border border-gray-200 bg-white shadow-sm ${className}`}>{children}</div>);
const Badge = ({ children, tone = "gray" }) => {
  const tones = { gray: "bg-gray-100 text-gray-700", green: "bg-green-100 text-green-700", blue: "bg-blue-100 text-blue-700", amber: "bg-amber-100 text-amber-800", purple: "bg-purple-100 text-purple-700" };
  return <span className={`inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-medium ${tones[tone]}`}>{children}</span>;
};
const Row = ({ label, value, strong, tone }) => (
  <div className="flex items-center justify-between py-1.5">
    <span className={`text-sm ${strong ? "font-semibold text-gray-900" : "text-gray-500"}`}>{label}</span>
    <span className={`text-sm tabular-nums ${strong ? "font-bold" : ""} ${tone === "neg" ? "text-rose-600" : tone === "pos" ? "text-emerald-600" : "text-gray-900"}`}>{value}</span>
  </div>
);

// ---- Login gate -----------------------------------------------------------
const TZ_OPTIONS = ["America/New_York", "America/Chicago", "America/Denver", "America/Los_Angeles", "America/Phoenix", "America/Anchorage", "Pacific/Honolulu"];

function Login({ onLogin, onRegister }) {
  const [mode, setMode] = useState("signin");
  const [email, setEmail] = useState("owner@polished.test");
  const [password, setPassword] = useState("");
  const [salonName, setSalonName] = useState("");
  const [ownerName, setOwnerName] = useState("");
  const [timezone, setTimezone] = useState("America/Chicago");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState(null);
  const isSignup = mode === "signup";
  const switchMode = (m) => { setMode(m); setErr(null); setPassword(""); if (m === "signup") setEmail(""); };
  const submit = async (e) => {
    e.preventDefault(); setBusy(true); setErr(null);
    try {
      if (isSignup) await onRegister({ salonName: salonName.trim(), ownerName: ownerName.trim(), ownerEmail: email.trim(), password, timezone });
      else await onLogin(email, password);
    } catch (e2) { setErr(e2.message || String(e2)); } finally { setBusy(false); }
  };
  const canSubmit = isSignup ? (salonName.trim() && ownerName.trim() && email.trim() && password.length >= 6) : password;
  return (
    <div className="flex min-h-screen items-center justify-center bg-gray-50 px-4 py-10">
      <form onSubmit={submit} className="w-full max-w-sm rounded-2xl border border-gray-200 bg-white p-6 shadow-sm">
        <div className="mb-5 flex items-center gap-2">
          <div className="flex h-9 w-9 items-center justify-center rounded-xl bg-purple-600 text-white"><Scissors size={18} /></div>
          <div><div className="text-sm font-bold leading-tight">Polished POS</div><div className="text-xs text-gray-500 leading-tight">{isSignup ? "Create your salon" : "Sign in to your salon"}</div></div>
        </div>
        <div className="mb-5 flex rounded-lg bg-gray-100 p-0.5 text-xs font-medium">
          <button type="button" onClick={() => switchMode("signin")} className={`flex-1 rounded-md px-3 py-1.5 ${!isSignup ? "bg-white text-purple-700 shadow-sm" : "text-gray-500"}`}>Sign in</button>
          <button type="button" onClick={() => switchMode("signup")} className={`flex-1 rounded-md px-3 py-1.5 ${isSignup ? "bg-white text-purple-700 shadow-sm" : "text-gray-500"}`}>Create salon</button>
        </div>
        {isSignup && <>
          <label className="mb-3 block"><span className="mb-1 block text-xs font-medium text-gray-500">Salon name</span><input value={salonName} onChange={(e) => setSalonName(e.target.value)} placeholder="Polished Nail Bar" className="w-full rounded-xl border border-gray-200 px-3 py-2 text-sm outline-none" /></label>
          <label className="mb-3 block"><span className="mb-1 block text-xs font-medium text-gray-500">Your name (owner)</span><input value={ownerName} onChange={(e) => setOwnerName(e.target.value)} placeholder="Jane Tran" className="w-full rounded-xl border border-gray-200 px-3 py-2 text-sm outline-none" /></label>
        </>}
        <label className="mb-3 block"><span className="mb-1 block text-xs font-medium text-gray-500">Email</span><input type="email" value={email} onChange={(e) => setEmail(e.target.value)} autoComplete="username" placeholder={isSignup ? "you@yoursalon.com" : ""} className="w-full rounded-xl border border-gray-200 px-3 py-2 text-sm outline-none" /></label>
        <label className="mb-3 block"><span className="mb-1 block text-xs font-medium text-gray-500">Password{isSignup && <span className="text-gray-400"> (min 6 chars)</span>}</span><input type="password" value={password} onChange={(e) => setPassword(e.target.value)} autoComplete={isSignup ? "new-password" : "current-password"} className="w-full rounded-xl border border-gray-200 px-3 py-2 text-sm outline-none" /></label>
        {isSignup && <label className="mb-4 block"><span className="mb-1 block text-xs font-medium text-gray-500">Timezone</span><select value={timezone} onChange={(e) => setTimezone(e.target.value)} className="w-full rounded-xl border border-gray-200 px-3 py-2 text-sm">{TZ_OPTIONS.map((z) => <option key={z} value={z}>{z}</option>)}</select></label>}
        {err && <div className="mb-3 rounded-lg bg-rose-50 px-3 py-2 text-xs text-rose-700">{err}</div>}
        <button type="submit" disabled={busy || !canSubmit} className="flex w-full items-center justify-center gap-2 rounded-xl bg-purple-600 py-2.5 text-sm font-semibold text-white disabled:opacity-50"><Lock size={15} /> {busy ? (isSignup ? "Creating…" : "Signing in…") : (isSignup ? "Create salon" : "Sign in")}</button>
        {isSignup && <p className="mt-3 text-center text-xs text-gray-400">Creates a brand-new salon with its own private data. You'll be signed in as the owner.</p>}
      </form>
    </div>
  );
}

function SalonPOS() {
  const [user, setUser] = useState(null);
  const [tab, setTab] = useState("schedule");
  const [config, setConfig] = useState(null);
  const [techs, setTechs] = useState([]);
  const [appts, setAppts] = useState([]);
  const [tickets, setTickets] = useState([]);
  const [pending, setPending] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const loadAll = async () => {
    setLoading(true); setError(null);
    try {
      await api.loadCalendar();
      const day = api.today();
      const [cfg, staff, apptRows, tks] = await Promise.all([api.getSettings(), api.getStaff(), api.getAppointments(day), api.getTickets(day)]);
      setConfig(cfg); setTechs(staff);
      setAppts(apptRows.map(adaptAppt).filter((a) => ["booked", "in_chair", "done"].includes(a.status)));
      setTickets(tks);
    } catch (e) { setError(e.message || String(e)); } finally { setLoading(false); }
  };
  useEffect(() => { if (user) loadAll(); }, [user]);
  const handleLogin = async (email, password) => { setUser(await api.login(email, password)); };
  const handleRegister = async (body) => { setUser(await api.registerSalon(body)); };
  const handleLogout = () => { api.logout(); setUser(null); setConfig(null); setTechs([]); setAppts([]); setTickets([]); setTab("schedule"); };
  const refreshTickets = async () => setTickets(await api.getTickets(api.today()));
  const refreshAppts = async () => setAppts((await api.getAppointments(api.today())).map(adaptAppt).filter((a) => ["booked", "in_chair", "done"].includes(a.status)));
  const refreshStaff = async () => setTechs(await api.getStaff());
  const goCheckout = (appt) => { setPending(appt); setTab("checkout"); };
  const handleCheckout = async (payload) => { const r = await api.checkout(payload); await Promise.all([refreshTickets(), refreshAppts()]); return r; };
  const handleAddWalkIn = async (techId) => { const taken = new Set(appts.filter((a) => a.techId === techId).map((a) => a.time)); const slot = SLOTS.find((s) => !taken.has(s)) || SLOTS[SLOTS.length - 1]; await api.createAppointment({ techId, clientLabel: "Walk-in", serviceDesc: "New service", startsAt: slotToISO(slot, api.today()) }); await refreshAppts(); };
  const handleSaveSettings = async (cfg) => setConfig(await api.putSettings(cfg));
  const handleSaveComp = async (staffId, body) => { await api.updateStaffComp(staffId, body); await refreshStaff(); };
  const handleAddStaff = async (body) => { const r = await api.createStaff(body); if (body.password) { await api.setStaffPassword(r.staffId, body.password); } await refreshStaff(); return r; };
  const handleSetPassword = async (staffId, password) => { await api.setStaffPassword(staffId, password); };
  const isManager = user && (user.role === "OWNER" || user.role === "ADMIN");
  const tabs = [
    { id: "schedule", label: "Turns", icon: Calendar },
    { id: "checkout", label: "Checkout", icon: ShoppingCart },
    { id: "dashboard", label: "Tech Dashboard", icon: LayoutDashboard },
    ...(isManager ? [{ id: "owner", label: "Owner", icon: DollarSign }, { id: "admin", label: "Admin Config", icon: Settings }] : []),
  ];
  if (!user) return <Login onLogin={handleLogin} onRegister={handleRegister} />;
  return (
    <div className="min-h-screen bg-gray-50 text-gray-900">
      <header className="flex items-center justify-between border-b border-gray-200 bg-white px-6 py-3">
        <div className="flex items-center gap-2"><div className="flex h-9 w-9 items-center justify-center rounded-xl bg-purple-600 text-white"><Scissors size={18} /></div><div><div className="text-sm font-bold leading-tight">Polished POS</div><div className="text-xs text-gray-500 leading-tight">Salon &amp; Commission Manager</div></div></div>
        <div className="flex items-center gap-2">
          <Badge tone={error ? "amber" : "green"}>{error ? "API offline" : "Live API"}</Badge>
          <span className="hidden text-xs text-gray-500 sm:inline">{user.name} · {user.role}</span>
          <button onClick={loadAll} className="flex items-center gap-1.5 rounded-lg border border-gray-200 px-2.5 py-1.5 text-xs font-medium text-gray-600"><RefreshCw size={13} /> Refresh</button>
          <button onClick={handleLogout} className="flex items-center gap-1.5 rounded-lg border border-gray-200 px-2.5 py-1.5 text-xs font-medium text-gray-600"><LogOut size={13} /> Sign out</button>
        </div>
      </header>
      <nav className="flex gap-1 border-b border-gray-200 bg-white px-4">{tabs.map((t) => { const Icon = t.icon; const active = tab === t.id; return <button key={t.id} onClick={() => setTab(t.id)} className={`flex items-center gap-2 border-b-2 px-4 py-3 text-sm font-medium ${active ? "border-purple-600 text-purple-700" : "border-transparent text-gray-500"}`}><Icon size={16} /> {t.label}</button>; })}</nav>
      <main className="mx-auto max-w-6xl p-6">
        {loading && <div className="flex items-center justify-center gap-2 py-20 text-gray-400"><RefreshCw size={18} className="animate-spin" /> Loading from API…</div>}
        {!loading && error && (
          <Card className="p-6"><div className="flex items-start gap-3"><WifiOff size={20} className="mt-0.5 text-amber-500" /><div>
            <div className="font-semibold">Couldn't reach the API</div>
            <p className="mt-1 text-sm text-gray-500">Check that the API is deployed and <code className="rounded bg-gray-100 px-1">window.__SALON_API__</code> points to it (currently <code className="rounded bg-gray-100 px-1">{api.API_BASE}</code>), and that its CORS_ORIGIN allows this site.</p>
            <p className="mt-1 text-xs text-gray-400">Details: {error}</p>
            <button onClick={loadAll} className="mt-3 rounded-lg bg-purple-600 px-3 py-1.5 text-sm font-medium text-white">Retry</button>
          </div></div></Card>
        )}
        {!loading && !error && config && techs.length > 0 && (<>
          {tab === "schedule" && <Schedule techs={techs} appts={appts} onAddWalkIn={handleAddWalkIn} onCheckout={goCheckout} />}
          {tab === "checkout" && <Checkout techs={techs} config={config} user={user} pending={pending} clearPending={() => setPending(null)} onComplete={handleCheckout} />}
          {tab === "dashboard" && <Dashboard techs={techs} config={config} tickets={tickets} user={user} />}
          {tab === "owner" && <Owner techs={techs} config={config} tickets={tickets} today={api.today()} />}
          {tab === "admin" && <Admin config={config} techs={techs} onSaveSettings={handleSaveSettings} onSaveComp={handleSaveComp} onAddStaff={handleAddStaff} onSetPassword={handleSetPassword} />}
        </>)}
        {!loading && !error && config && techs.length === 0 && (isManager
          ? <div className="space-y-4"><Card className="p-5"><div className="flex items-start gap-3"><Building2 size={20} className="mt-0.5 text-purple-500" /><div><div className="font-semibold">Welcome to {user.name ? "your salon" : "Polished POS"} 🎉</div><p className="mt-1 text-sm text-gray-500">You're all set up. Add your first employee below to start booking turns and running checkout. Set their W-2/1099 type and pay here — you can give them a login too.</p></div></div></Card>
              <Admin config={config} techs={techs} onSaveSettings={handleSaveSettings} onSaveComp={handleSaveComp} onAddStaff={handleAddStaff} onSetPassword={handleSetPassword} /></div>
          : <Card className="p-6 text-sm text-gray-500">No staff yet. Ask your salon owner to add you, then Refresh.</Card>)}

    </div>
  );
}

const MoneyInput = ({ label, icon: Icon, value, set }) => (
  <label className="block"><span className="mb-1 flex items-center gap-1.5 text-xs font-medium text-gray-500"><Icon size={13} /> {label}</span><div className="flex items-center rounded-xl border border-gray-200 px-3 py-2"><span className="text-gray-400">$</span><input type="number" min="0" step="0.01" value={(value / 100).toString()} onChange={(e) => set(Math.round(parseFloat(e.target.value || "0") * 100))} className="w-full bg-transparent pl-1 text-sm outline-none" /></div></label>
);

function Checkout({ techs, config, user, pending, clearPending, onComplete }) {
  const isTech = user?.role === "TECH";
  const defaultTech = pending?.techId || (isTech ? user.id : techs[0].id);
  const [techId, setTechId] = useState(defaultTech);
  const [service, setService] = useState(8000); const [retail, setRetail] = useState(2000); const [ccTip, setCcTip] = useState(1500); const [cashTip, setCashTip] = useState(0);
  const [done, setDone] = useState(null); const [busy, setBusy] = useState(false); const [err, setErr] = useState(null);
  useEffect(() => { if (pending?.techId) setTechId(pending.techId); }, [pending]);
  const tech = techs.find((t) => t.id === techId) || techs[0]; const ticket = { service, retail, ccTip, cashTip }; const isW2 = tech.employmentType === "W2";
  const w2 = useMemo(() => computeW2Ticket(ticket, tech, config), [service, retail, ccTip, cashTip, tech, config]);
  const renter = useMemo(() => computeRenterPayout(ticket, config), [service, retail, ccTip, cashTip, config]);
  const ticketTotal = service + retail + ccTip;
  const completeSale = async () => {
    setBusy(true); setErr(null);
    try {
      const lineItems = []; if (service > 0) lineItems.push({ kind: "SERVICE", description: "Service", amountCents: service }); if (retail > 0) lineItems.push({ kind: "RETAIL", description: "Retail", amountCents: retail });
      const tips = []; if (ccTip > 0) tips.push({ method: "CARD", amountCents: ccTip }); if (cashTip > 0) tips.push({ method: "CASH", amountCents: cashTip });
      await onComplete({ techId, appointmentId: pending?.id ?? null, lineItems, tips });
      setDone({ name: tech.name, isW2, amount: isW2 ? w2.techTakeHome : renter.instantPayout }); clearPending(); setService(0); setRetail(0); setCcTip(0); setCashTip(0);
    } catch (e) { setErr(e.message || String(e)); } finally { setBusy(false); }
  };
  return (
    <div className="space-y-4">
      {done && <div className="flex items-center justify-between rounded-xl border border-emerald-200 bg-emerald-50 px-4 py-3"><span className="flex items-center gap-2 text-sm font-medium text-emerald-800"><CheckCircle2 size={16} /> Sale recorded for {done.name} — {done.isW2 ? "commission" : "instant payout"} {fmt(done.amount)}. It now shows on the dashboards.</span><button onClick={() => setDone(null)} className="text-xs font-medium text-emerald-700">Dismiss</button></div>}
      {err && <div className="rounded-xl border border-rose-200 bg-rose-50 px-4 py-2 text-sm text-rose-700">Checkout failed: {err}</div>}
      {pending && <div className="rounded-xl border border-blue-200 bg-blue-50 px-4 py-2 text-sm text-blue-800">Checking out <span className="font-semibold">{pending.client}</span> · {pending.service}</div>}
      <div className="grid grid-cols-1 gap-5 lg:grid-cols-2">
        <Card className="p-5"><h2 className="mb-4 text-lg font-bold">Ticket</h2>
          <label className="mb-4 block"><span className="mb-1 block text-xs font-medium text-gray-500">Assigned tech</span><select value={techId} onChange={(e) => setTechId(e.target.value)} disabled={isTech} className="w-full rounded-xl border border-gray-200 px-3 py-2 text-sm disabled:bg-gray-50 disabled:text-gray-500">{(isTech ? techs.filter((t) => t.id === user.id) : techs).map((t) => <option key={t.id} value={t.id}>{t.name} ({t.employmentType === "W2" ? "W-2" : "1099"})</option>)}</select></label>
          <div className="grid grid-cols-2 gap-3"><MoneyInput label="Service" icon={Scissors} value={service} set={setService} /><MoneyInput label="Retail" icon={Package} value={retail} set={setRetail} /><MoneyInput label="Card tip" icon={CreditCard} value={ccTip} set={setCcTip} /><MoneyInput label="Cash tip" icon={Banknote} value={cashTip} set={setCashTip} /></div>
          <div className="mt-4 rounded-xl bg-gray-50 p-3"><Row label="Ticket charged to card" value={fmt(ticketTotal)} strong /><p className="mt-1 text-xs text-gray-400">Cash tip ({fmt(cashTip)}) handed directly to tech — not on the card.</p></div></Card>
        <Card className="p-5"><div className="mb-4 flex items-center justify-between"><h2 className="text-lg font-bold">{isW2 ? "Commission Breakdown" : "Instant Payout"}</h2><Badge tone={isW2 ? "blue" : "purple"}>{isW2 ? "W-2 path" : "1099 path"}</Badge></div>
          {isW2 ? <div>
            <Row label="Gross service" value={fmt(service)} /><Row label={`Card fee (${pct(config.ccFeePctBps)} + ${fmt(config.ccFeeFixedCents)})`} value={`- ${fmt(w2.ccFeeOnService)}`} tone="neg" /><Row label={`Product cost (${pct(config.productCostPctBps)})`} value={`- ${fmt(w2.productCost)}`} tone="neg" /><div className="my-1 border-t border-dashed border-gray-200" /><Row label="Net service revenue" value={fmt(w2.netService)} strong /><Row label={`Service commission (${pct(tech.serviceCommissionBps)})`} value={fmt(w2.serviceCommission)} tone="pos" /><Row label={`Retail commission (${pct(tech.retailCommissionBps)})`} value={fmt(w2.retailCommission)} tone="pos" /><Row label="Card tip (100% to tech)" value={fmt(w2.cardTip)} tone="pos" /><Row label="Cash tip" value={fmt(w2.cashTip)} tone="pos" /><div className="my-1 border-t border-gray-200" /><Row label="Tech earns this ticket" value={fmt(w2.techTakeHome)} strong /><div className="mt-4 flex items-start gap-2 rounded-xl bg-blue-50 p-3 text-xs text-blue-800"><AlertTriangle size={14} className="mt-0.5 shrink-0" /><span>Commission accrues to payroll. Final pay is re-checked against the minimum-wage floor &amp; overtime each workweek (see Dashboard).</span></div>
          </div> : <div>
            <Row label="Gross service" value={fmt(service)} /><Row label="Card tip" value={fmt(ccTip)} /><Row label="Card processing fee" value={`- ${fmt(renter.cardFee)}`} tone="neg" /><div className="my-1 border-t border-gray-200" /><Row label="Instant payout → contractor bank" value={fmt(renter.instantPayout)} strong tone="pos" /><Row label="Cash tip (already with tech)" value={fmt(renter.cashTip)} /><Row label="Retail → salon" value={fmt(renter.salonRetail)} /><div className="mt-4 flex items-start gap-2 rounded-xl bg-purple-50 p-3 text-xs text-purple-800"><AlertTriangle size={14} className="mt-0.5 shrink-0" /><span>No commission split — booth renter keeps gross service. Salon earns via chair rent, billed separately as a recurring charge.</span></div>
          </div>}
          <button onClick={completeSale} disabled={busy || service + retail === 0} className="mt-4 w-full rounded-xl bg-purple-600 py-2.5 text-sm font-semibold text-white disabled:opacity-40">{busy ? "Processing…" : isW2 ? "Complete sale & record commission" : "Complete sale & send instant payout"}</button>
          {service + retail === 0 && <p className="mt-2 text-center text-xs text-gray-400">Add a service or retail amount to check out.</p>}</Card>
      </div>
    </div>
  );

function Dashboard({ techs, config, tickets, user }) {
  const isTech = user?.role === "TECH";
  const visibleTechs = isTech ? techs.filter((t) => t.id === user.id) : techs;
  const [techId, setTechId] = useState(isTech ? user.id : techs[0].id);
  const [pay, setPay] = useState(null); const [clk, setClk] = useState(null); const [clkBusy, setClkBusy] = useState(false); const [clkErr, setClkErr] = useState(null);
  const tech = techs.find((t) => t.id === techId) || techs[0]; const isW2 = tech.employmentType === "W2"; const myTickets = tickets.filter((t) => t.techId === techId);
  useEffect(() => { let active = true; setPay(null); setClk(null); setClkErr(null); if (isW2) { api.getPayroll(api.workweekStart(), techId).then((p) => active && setPay(p)).catch(() => active && setPay(null)); api.clockStatus(techId, api.todayISO()).then((s) => active && setClk(s)).catch(() => active && setClk(null)); } return () => { active = false; }; }, [techId, isW2]);
  const doClock = async (dir) => { setClkBusy(true); setClkErr(null); try { setClk(dir === "in" ? await api.clockIn(techId) : await api.clockOut(techId)); } catch (e) { setClkErr(e.message || String(e)); } finally { setClkBusy(false); } };
  const totals = myTickets.reduce((acc, t) => { if (isW2) { const b = computeW2Ticket(t, tech, config); acc.service += b.serviceCommission; acc.retail += b.retailCommission; } else { const p = computeRenterPayout(t, config); acc.service += p.instantPayout; } acc.ccTip += t.ccTip; acc.cashTip += t.cashTip; return acc; }, { service: 0, retail: 0, ccTip: 0, cashTip: 0 });
  const tips = totals.ccTip + totals.cashTip; const earned = totals.service + totals.retail + tips; const f = flsaView(pay);
  const Stat = ({ label, value, sub, tone = "gray" }) => <Card className="p-4"><div className="text-xs font-medium text-gray-500">{label}</div><div className={`mt-1 text-2xl font-bold tabular-nums ${tone === "pos" ? "text-emerald-600" : ""}`}>{value}</div>{sub && <div className="mt-0.5 text-xs text-gray-400">{sub}</div>}</Card>;
  return (
    <div className="space-y-5">
      <div className="flex items-center justify-between"><div><h2 className="text-lg font-bold">Tech Dashboard</h2><p className="text-sm text-gray-500">Real-time daily earnings — keeps the end-of-week paycheck honest.</p></div><select value={techId} onChange={(e) => setTechId(e.target.value)} disabled={isTech} className="rounded-xl border border-gray-200 px-3 py-2 text-sm disabled:bg-gray-50 disabled:text-gray-500">{visibleTechs.map((t) => <option key={t.id} value={t.id}>{t.name}</option>)}</select></div>
      {isW2 && <Card className="p-4"><div className="flex items-center justify-between"><div className="flex items-center gap-2"><Clock size={16} className={clk?.clockedIn ? "text-emerald-600" : "text-gray-400"} /><div><div className="text-sm font-semibold">{clk?.clockedIn ? "Clocked in" : "Clocked out"}</div><div className="text-xs text-gray-400">{clk ? `${clk.hoursToday.toFixed(2)} h today${clk.since ? ` · since ${new Date(clk.since).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}` : ""}` : "—"}</div></div></div><div className="flex items-center gap-2">{clkErr && <span className="text-xs text-rose-600">{clkErr}</span>}{clk?.clockedIn ? <button onClick={() => doClock("out")} disabled={clkBusy} className="rounded-lg border border-gray-200 px-3 py-1.5 text-xs font-medium text-gray-700 disabled:opacity-50">{clkBusy ? "…" : "Clock out"}</button> : <button onClick={() => doClock("in")} disabled={clkBusy} className="rounded-lg bg-purple-600 px-3 py-1.5 text-xs font-medium text-white disabled:opacity-50">{clkBusy ? "…" : "Clock in"}</button>}</div></div></Card>}
      <div className="grid grid-cols-2 gap-3 md:grid-cols-4"><Stat label="Earned today" value={fmt(earned)} tone="pos" sub={`${myTickets.length} tickets`} /><Stat label={isW2 ? "Service commission" : "Service payout"} value={fmt(totals.service)} /><Stat label="Retail commission" value={fmt(totals.retail)} sub={isW2 ? "" : "n/a for 1099"} /><Stat label="Tips (card + cash)" value={fmt(tips)} sub={`${fmt(totals.ccTip)} card · ${fmt(totals.cashTip)} cash`} /></div>
      <div className="grid grid-cols-1 gap-5 lg:grid-cols-2">
        <Card className="p-5"><h3 className="mb-3 font-semibold">Service vs Retail</h3><SplitBar service={totals.service} retail={totals.retail} /><Row label="Service" value={fmt(totals.service)} /><Row label="Retail" value={fmt(totals.retail)} /><Row label="Tips" value={fmt(tips)} /></Card>
        {isW2 ? <Card className="p-5"><div className="mb-3 flex items-center gap-2"><h3 className="font-semibold">Weekly FLSA check</h3>{f && <Badge tone={f.topUp > 0 ? "amber" : "green"}>{f.topUp > 0 ? "Floor applied" : "Above floor"}</Badge>}</div>{f ? <><Row label="Hours this week" value={`${f.hours.toFixed(1)} h`} /><Row label="Commission wages" value={fmt(f.commission)} /><Row label={`Min-wage floor (${fmt(config.minWageCentsPerHour)}/h)`} value={fmt(f.floor)} />{f.topUp > 0 && <Row label="Min-wage top-up" value={`+ ${fmt(f.topUp)}`} tone="pos" />}{f.otHours > 0 && <Row label={`Overtime premium (${f.otHours.toFixed(1)} h @ ½ rate)`} value={`+ ${fmt(f.otPremium)}`} tone="pos" />}<div className="my-1 border-t border-gray-200" /><Row label="Projected weekly gross" value={fmt(f.gross)} strong /><p className="mt-2 text-xs text-gray-400">Regular rate {fmt(f.rate)}/h. From the payroll endpoint (commission records + time entries).</p></> : <p className="text-sm text-gray-400">No payroll data for this week yet (needs commission records + clocked hours).</p>}</Card>
        : <Card className="p-5"><div className="mb-3 flex items-center gap-2"><Building2 size={16} /><h3 className="font-semibold">Booth rent</h3></div><Row label="Chair rent" value={`${fmt(tech.rentCents || 0)} / ${(tech.rentCadence || "WEEKLY").toLowerCase()}`} /><Row label="Next charge" value="Mon, auto-debit" /><div className="my-1 border-t border-gray-200" /><Row label="Service payouts go to" value="Connected bank (instant)" /><p className="mt-2 text-xs text-gray-400">No hours tracked for wage purposes — 1099 contractor.</p></Card>}
      </div>
    </div>

function SplitBar({ service, retail }) { const total = Math.max(1, service + retail); const sPct = (service / total) * 100; return <div className="mb-3 flex h-3 overflow-hidden rounded-full bg-gray-100"><div className="bg-purple-500" style={{ width: `${sPct}%` }} /><div className="bg-pink-400" style={{ width: `${100 - sPct}%` }} /></div>; }

function Owner({ techs, config, tickets, today }) {
  const [payroll, setPayroll] = useState([]); const [pool, setPool] = useState(null); const [msg, setMsg] = useState(null); const [busy, setBusy] = useState(false);
  useEffect(() => { api.getPayroll(api.workweekStart()).then((d) => setPayroll(Array.isArray(d) ? d : [d])).catch(() => setPayroll([])); api.getTipPool(today).then(setPool).catch(() => setPool(null)); }, [today]);
  const commitPayroll = async () => { setBusy(true); setMsg(null); try { const r = await api.commitPayroll(api.workweekStart()); setMsg(`Payroll committed — ${r.lines.length} line(s) for ${r.startsOn} → ${r.endsOn} (period locked).`); } catch (e) { setMsg(`Commit failed: ${e.message}`); } finally { setBusy(false); } };
  const finalizePool = async () => { setBusy(true); setMsg(null); try { const r = await api.commitTipPool(today); setMsg(r.alreadyExisted ? "Tip pool was already finalized for today." : `Tip pool finalized — ${r.shares.length} share(s) written.`); } catch (e) { setMsg(`Finalize failed: ${e.message}`); } finally { setBusy(false); } };
  const streams = tickets.reduce((a, t) => { a.grossService += t.service; a.retail += t.retail; a.cardTip += t.ccTip; a.cashTip += t.cashTip; return a; }, { grossService: 0, retail: 0, cardTip: 0, cashTip: 0 });
  const payRows = payroll.map((wp) => ({ name: wp.techName, ...flsaView(wp) })); const payrollTotal = payRows.reduce((s, r) => s + (r?.gross || 0), 0);
  const exportCsv = () => { const usd = (c) => (c / 100).toFixed(2); const head = ["Employee", "Hours", "Commission", "MinWageTopUp", "OvertimePremium", "GrossPay"]; const lines = payRows.map((r) => [r.name, r.hours.toFixed(2), usd(r.commission), usd(r.topUp), usd(r.otPremium), usd(r.gross)].map((v) => (/[",\n]/.test(String(v)) ? `"${String(v).replace(/"/g, '""')}"` : v)).join(",")); const csv = [head.join(","), ...lines].join("\n"); const blob = new Blob([csv], { type: "text/csv" }); const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = `payroll_${api.workweekStart()}.csv`; a.click(); URL.revokeObjectURL(url); };
  const rentRows = techs.filter((t) => t.employmentType === "1099").map((t) => ({ tech: t, payout: tickets.filter((k) => k.techId === t.id).reduce((s, k) => s + computeRenterPayout(k, config).instantPayout, 0) }));
  const StreamCard = ({ icon: Icon, label, value, tone, note }) => <Card className="p-4"><div className="flex items-center gap-2 text-xs font-medium text-gray-500"><Icon size={14} className={tone} /> {label}</div><div className="mt-1 text-2xl font-bold tabular-nums">{fmt(value)}</div>{note && <div className="mt-0.5 text-xs text-gray-400">{note}</div>}</Card>;
  return (
    <div className="space-y-5">
      <div><h2 className="text-lg font-bold">Owner — Revenue &amp; Payroll</h2><p className="text-sm text-gray-500">Revenue streams are tracked separately to protect margin and keep payroll/1099 reporting clean.</p></div>
      {msg && <div className="rounded-xl border border-gray-200 bg-gray-50 px-4 py-2 text-sm text-gray-600">{msg}</div>}
      <div className="grid grid-cols-2 gap-3 md:grid-cols-4"><StreamCard icon={Scissors} label="Gross service revenue" value={streams.grossService} tone="text-purple-500" note="Labor" /><StreamCard icon={Package} label="Retail revenue" value={streams.retail} tone="text-pink-500" note="Product sales" /><StreamCard icon={CreditCard} label="Card tips" value={streams.cardTip} tone="text-blue-500" note="Via gateway" /><StreamCard icon={Banknote} label="Cash tips" value={streams.cashTip} tone="text-emerald-500" note="Reported only" /></div>
      <Card className="p-5"><div className="mb-3 flex items-center justify-between"><div className="flex items-center gap-2"><FileSpreadsheet size={16} /><h3 className="font-semibold">W-2 payroll export (this week)</h3></div><div className="flex items-center gap-2"><button onClick={commitPayroll} disabled={busy} className="rounded-lg bg-purple-600 px-3 py-1.5 text-xs font-medium text-white disabled:opacity-50">{busy ? "Working…" : "Generate & lock payroll"}</button><button onClick={exportCsv} disabled={payRows.length === 0} className="flex items-center gap-2 rounded-lg border border-gray-200 px-3 py-1.5 text-xs font-medium text-gray-600 disabled:opacity-50"><Download size={13} /> Export CSV</button></div></div>
        {payRows.length === 0 ? <p className="text-sm text-gray-400">No payroll data yet this week.</p> : <div className="overflow-x-auto"><table className="w-full min-w-[560px] text-sm"><thead><tr className="border-b border-gray-200 text-left text-xs text-gray-400"><th className="py-2 font-medium">Employee</th><th className="py-2 text-right font-medium">Hours</th><th className="py-2 text-right font-medium">Commission</th><th className="py-2 text-right font-medium">Min-wage top-up</th><th className="py-2 text-right font-medium">OT premium</th><th className="py-2 text-right font-medium">Gross pay</th></tr></thead><tbody>{payRows.map((r) => <tr key={r.name} className="border-b border-gray-100"><td className="py-2 font-medium">{r.name}</td><td className="py-2 text-right tabular-nums">{r.hours.toFixed(1)}</td><td className="py-2 text-right tabular-nums">{fmt(r.commission)}</td><td className={`py-2 text-right tabular-nums ${r.topUp > 0 ? "text-amber-600" : "text-gray-400"}`}>{r.topUp > 0 ? `+ ${fmt(r.topUp)}` : "—"}</td><td className={`py-2 text-right tabular-nums ${r.otPremium > 0 ? "text-emerald-600" : "text-gray-400"}`}>{r.otPremium > 0 ? `+ ${fmt(r.otPremium)}` : "—"}</td><td className="py-2 text-right font-bold tabular-nums">{fmt(r.gross)}</td></tr>)}<tr><td className="py-2 font-semibold" colSpan={5}>Total payroll liability</td><td className="py-2 text-right font-bold tabular-nums">{fmt(payrollTotal)}</td></tr></tbody></table></div>}
        <p className="mt-2 text-xs text-gray-400">Held in the salon merchant account; this file goes to your payroll provider. Not paid as instant payout.</p></Card>
      <div className="grid grid-cols-1 gap-5 lg:grid-cols-2">
        <Card className="p-5"><div className="mb-3 flex items-center gap-2"><Building2 size={16} /><h3 className="font-semibold">1099 contractors</h3></div>{rentRows.length === 0 && <p className="text-sm text-gray-400">No booth renters configured.</p>}{rentRows.map((r) => <div key={r.tech.id} className="border-b border-gray-100 py-2 last:border-0"><div className="flex items-center justify-between"><span className="text-sm font-medium">{r.tech.name}</span><Badge tone="purple">1099</Badge></div><Row label="Instant payouts sent" value={fmt(r.payout)} tone="pos" /><Row label="Chair rent owed" value={`${fmt(r.tech.rentCents || 0)} / ${(r.tech.rentCadence || "WEEKLY").toLowerCase()}`} /></div>)}<p className="mt-2 text-xs text-gray-400">Rent billed via recurring charge; service revenue already routed to their bank.</p></Card>
        <Card className="p-5"><div className="mb-3 flex items-center justify-between"><div className="flex items-center gap-2"><Coins size={16} /><h3 className="font-semibold">Tip pool (today)</h3></div><div className="flex items-center gap-2">{config.tipPoolingEnabled && <button onClick={finalizePool} disabled={busy} className="rounded-lg bg-purple-600 px-2.5 py-1 text-xs font-medium text-white disabled:opacity-50">Finalize</button>}<Badge tone={config.tipPoolingEnabled ? "green" : "gray"}>{config.tipPoolingEnabled ? "Pooling ON" : "Pooling OFF"}</Badge></div></div>
          {config.tipPoolingEnabled ? <><Row label="W-2 card tips pooled" value={fmt(pool?.totalCardTipsCents || 0)} strong /><div className="my-1 border-t border-dashed border-gray-200" />{(pool?.shares || []).map((p) => <Row key={p.techId} label={`${p.techName} · ${p.hours}h`} value={fmt(p.shareCents)} tone="pos" />)}{(!pool || pool.shares.length === 0) && <p className="text-xs text-gray-400">No clocked W-2 hours today to split against.</p>}<p className="mt-2 text-xs text-gray-400">Split by hours, largest-remainder so shares sum exactly to the pool. 1099 contractors &amp; owners excluded by law.</p></> : <><p className="text-sm text-gray-500">Direct tips: 100% of each card tip stays with the tech who did the service.</p><div className="mt-2 flex items-start gap-2 rounded-xl bg-gray-50 p-3 text-xs text-gray-500"><Users size={14} className="mt-0.5 shrink-0" /><span>Turn on tip pooling in Admin Config to split daily card tips across W-2 staff by hours.</span></div></>}</Card>
      </div>
    </div>
  );
}

const CfgNum = ({ label, value, onChange, suffix, step = "1" }) => (
  <label className="block"><span className="mb-1 block text-xs font-medium text-gray-500">{label}</span><div className="flex items-center rounded-xl border border-gray-200 px-3 py-2"><input type="number" step={step} value={value} onChange={(e) => onChange(parseFloat(e.target.value || "0"))} className="w-full bg-transparent text-sm outline-none" />{suffix && <span className="text-xs text-gray-400">{suffix}</span>}</div></label>
);

function Admin({ config, techs, onSaveSettings, onSaveComp, onAddStaff, onSetPassword }) {
  const [cfg, setCfg] = useState(config); const [savingCfg, setSavingCfg] = useState(false); const [draft, setDraft] = useState({}); const [savingId, setSavingId] = useState(null); const [msg, setMsg] = useState(null);
  const NEW0 = { fullName: "", email: "", employmentType: "W2", serviceCommissionBps: 5000, retailCommissionBps: 1000, rentCents: 20000, rentCadence: "WEEKLY", password: "" };
  const [ns, setNs] = useState(NEW0); const [addingStaff, setAddingStaff] = useState(false);
  const [pwOpen, setPwOpen] = useState(null); const [pwVal, setPwVal] = useState(""); const [pwSaving, setPwSaving] = useState(false);
  const setNsField = (k, v) => setNs((s) => ({ ...s, [k]: v }));
  const addStaff = async () => {
    if (!ns.fullName.trim()) { setMsg("Enter the employee's name."); return; }
    if (ns.password && ns.password.length < 6) { setMsg("Password must be at least 6 characters (or leave it blank)."); return; }
    const w2 = ns.employmentType === "W2";
    const body = { fullName: ns.fullName.trim(), email: ns.email.trim() || null, role: "TECH",
      ...(w2 ? { employmentType: "W2", serviceCommissionBps: ns.serviceCommissionBps || 0, retailCommissionBps: ns.retailCommissionBps || 0 }
            : { employmentType: "1099", rentAmountCents: ns.rentCents || 0, rentCadence: (ns.rentCadence || "WEEKLY").toUpperCase() }) };
    if (ns.password) body.password = ns.password;
    setAddingStaff(true); setMsg(null);
    try { await onAddStaff(body); setNs(NEW0); setMsg(`${body.fullName} added${ns.password ? " with a login" : ""}.`); }
    catch (e) { setMsg(`Add failed: ${e.message}`); }
    finally { setAddingStaff(false); }
  };
  const savePassword = async (t) => {
    if (!pwVal || pwVal.length < 6) { setMsg("Password must be at least 6 characters."); return; }
    setPwSaving(true); setMsg(null);
    try { await onSetPassword(t.id, pwVal); setPwOpen(null); setPwVal(""); setMsg(`Login set for ${t.name}.`); }
    catch (e) { setMsg(`Set login failed: ${e.message}`); }
    finally { setPwSaving(false); }
  };
  useEffect(() => setCfg(config), [config]);
  const setField = (k, v) => setCfg((c) => ({ ...c, [k]: v }));
  const saveSettings = async () => { setSavingCfg(true); setMsg(null); try { await onSaveSettings(cfg); setMsg("Settings saved."); } catch (e) { setMsg(`Save failed: ${e.message}`); } finally { setSavingCfg(false); } };
  const draftFor = (t) => ({ employmentType: t.employmentType, serviceCommissionBps: t.serviceCommissionBps, retailCommissionBps: t.retailCommissionBps, rentCents: t.rentCents, rentCadence: t.rentCadence || "WEEKLY", ...(draft[t.id] || {}) });
  const setDraftField = (id, patch) => setDraft((d) => ({ ...d, [id]: { ...(d[id] || {}), ...patch } }));
  const saveComp = async (t) => { const d = draftFor(t); const body = d.employmentType === "W2" ? { employmentType: "W2", serviceCommissionBps: d.serviceCommissionBps ?? 0, retailCommissionBps: d.retailCommissionBps ?? 0 } : { employmentType: "1099", rentAmountCents: d.rentCents ?? 0, rentCadence: (d.rentCadence || "WEEKLY").toUpperCase() }; setSavingId(t.id); setMsg(null); try { await onSaveComp(t.id, body); setDraft((dd) => { const n = { ...dd }; delete n[t.id]; return n; }); setMsg(`${t.name} updated.`); } catch (e) { setMsg(`Save failed: ${e.message}`); } finally { setSavingId(null); } };
  const ZONES = ["America/New_York", "America/Chicago", "America/Denver", "America/Los_Angeles", "America/Phoenix", "America/Anchorage", "Pacific/Honolulu"];
  return (
    <div className="space-y-5">
      {msg && <div className="rounded-xl border border-gray-200 bg-gray-50 px-4 py-2 text-sm text-gray-600">{msg}</div>}
      <Card className="p-5"><div className="mb-4 flex items-center justify-between"><div><h2 className="text-lg font-bold">Salon settings</h2><p className="text-sm text-gray-500">Overhead and compliance defaults applied across checkout.</p></div><button onClick={saveSettings} disabled={savingCfg} className="rounded-xl bg-purple-600 px-4 py-2 text-sm font-semibold text-white disabled:opacity-50">{savingCfg ? "Saving…" : "Save settings"}</button></div>
        <div className="grid grid-cols-2 gap-3 md:grid-cols-3"><CfgNum label="Card fee %" value={cfg.ccFeePctBps / 100} suffix="%" step="0.01" onChange={(v) => setField("ccFeePctBps", Math.round(v * 100))} /><CfgNum label="Card fee fixed" value={cfg.ccFeeFixedCents / 100} suffix="$" step="0.01" onChange={(v) => setField("ccFeeFixedCents", Math.round(v * 100))} /><CfgNum label="Product cost %" value={cfg.productCostPctBps / 100} suffix="%" step="0.5" onChange={(v) => setField("productCostPctBps", Math.round(v * 100))} /><CfgNum label="Local min wage" value={cfg.minWageCentsPerHour / 100} suffix="$/h" step="0.25" onChange={(v) => setField("minWageCentsPerHour", Math.round(v * 100))} /><label className="block"><span className="mb-1 block text-xs font-medium text-gray-500">Timezone (workweek anchor)</span><select value={cfg.timezone || "America/New_York"} onChange={(e) => setField("timezone", e.target.value)} className="w-full rounded-xl border border-gray-200 px-3 py-2 text-sm">{(ZONES.includes(cfg.timezone) ? ZONES : [cfg.timezone || "America/New_York", ...ZONES]).map((z) => <option key={z} value={z}>{z}</option>)}</select></label></div>
        <label className="mt-4 flex items-center justify-between rounded-xl bg-gray-50 p-3"><span><span className="block text-sm font-medium">Tip pooling (W-2 staff)</span><span className="block text-xs text-gray-400">Pool card tips daily, split by hours. Excludes 1099 contractors &amp; owners by law.</span></span><button onClick={() => setField("tipPoolingEnabled", !cfg.tipPoolingEnabled)} className={`relative h-6 w-11 rounded-full ${cfg.tipPoolingEnabled ? "bg-purple-600" : "bg-gray-300"}`}><span className={`absolute top-0.5 h-5 w-5 rounded-full bg-white transition-all ${cfg.tipPoolingEnabled ? "left-5" : "left-0.5"}`} /></button></label></Card>
      <Card className="p-5"><div className="mb-4 flex items-center justify-between"><div><h2 className="text-lg font-bold">Add employee</h2><p className="text-sm text-gray-500">Create a new staff member and (optionally) give them a login right away.</p></div><button onClick={addStaff} disabled={addingStaff} className="rounded-xl bg-purple-600 px-4 py-2 text-sm font-semibold text-white disabled:opacity-50">{addingStaff ? "Adding…" : "Add employee"}</button></div>
        <div className="grid grid-cols-2 gap-3 md:grid-cols-3">
          <label className="block"><span className="mb-1 block text-xs font-medium text-gray-500">Full name</span><input value={ns.fullName} onChange={(e) => setNsField("fullName", e.target.value)} placeholder="Jane Tran" className="w-full rounded-xl border border-gray-200 px-3 py-2 text-sm" /></label>
          <label className="block"><span className="mb-1 block text-xs font-medium text-gray-500">Email (login)</span><input type="email" value={ns.email} onChange={(e) => setNsField("email", e.target.value)} placeholder="jane@salon.com" className="w-full rounded-xl border border-gray-200 px-3 py-2 text-sm" /></label>
          <label className="block"><span className="mb-1 block text-xs font-medium text-gray-500">Temp password (optional)</span><input type="text" value={ns.password} onChange={(e) => setNsField("password", e.target.value)} placeholder="min 6 chars" className="w-full rounded-xl border border-gray-200 px-3 py-2 text-sm" /></label>
        </div>
        <div className="mt-3 flex items-center gap-2"><div className="flex rounded-lg bg-gray-100 p-0.5 text-xs font-medium"><button onClick={() => setNsField("employmentType", "W2")} className={`rounded-md px-3 py-1 ${ns.employmentType === "W2" ? "bg-white text-blue-700 shadow-sm" : "text-gray-500"}`}>W-2 Employee</button><button onClick={() => setNsField("employmentType", "1099")} className={`rounded-md px-3 py-1 ${ns.employmentType === "1099" ? "bg-white text-purple-700 shadow-sm" : "text-gray-500"}`}>1099 Renter</button></div></div>
        <div className="mt-3 grid grid-cols-2 gap-3">{ns.employmentType === "W2"
          ? <><CfgNum label="Service commission %" value={(ns.serviceCommissionBps || 0) / 100} suffix="%" onChange={(v) => setNsField("serviceCommissionBps", Math.round(v * 100))} /><CfgNum label="Retail commission %" value={(ns.retailCommissionBps || 0) / 100} suffix="%" onChange={(v) => setNsField("retailCommissionBps", Math.round(v * 100))} /></>
          : <><CfgNum label="Chair rent" value={(ns.rentCents || 0) / 100} suffix="$" step="10" onChange={(v) => setNsField("rentCents", Math.round(v * 100))} /><label className="block"><span className="mb-1 block text-xs font-medium text-gray-500">Rent cadence</span><select value={ns.rentCadence} onChange={(e) => setNsField("rentCadence", e.target.value)} className="w-full rounded-xl border border-gray-200 px-3 py-2 text-sm"><option value="WEEKLY">Weekly</option><option value="MONTHLY">Monthly</option></select></label></>}</div>
        <p className="mt-3 text-xs text-gray-400">An email is required for the employee to log in. Leave the password blank to add them now and set a login later.</p></Card>
      <Card className="p-5"><h2 className="mb-1 text-lg font-bold">Employee profiles</h2><p className="mb-4 text-sm text-gray-500">Toggle W-2 vs 1099 — it switches the entire payout &amp; compliance path. Save writes a new profile version.</p>
        <div className="space-y-3">{techs.map((t) => { const d = draftFor(t); const w2 = d.employmentType === "W2"; const dirty = !!draft[t.id]; return <div key={t.id} className="rounded-xl border border-gray-200 p-4"><div className="mb-3 flex items-center justify-between"><div className="font-semibold">{t.name}</div><div className="flex items-center gap-2"><div className="flex rounded-lg bg-gray-100 p-0.5 text-xs font-medium"><button onClick={() => setDraftField(t.id, { employmentType: "W2" })} className={`rounded-md px-3 py-1 ${w2 ? "bg-white text-blue-700 shadow-sm" : "text-gray-500"}`}>W-2 Employee</button><button onClick={() => setDraftField(t.id, { employmentType: "1099" })} className={`rounded-md px-3 py-1 ${!w2 ? "bg-white text-purple-700 shadow-sm" : "text-gray-500"}`}>1099 Renter</button></div><button onClick={() => saveComp(t)} disabled={!dirty || savingId === t.id} className="rounded-lg bg-purple-600 px-3 py-1.5 text-xs font-medium text-white disabled:opacity-40">{savingId === t.id ? "Saving…" : "Save"}</button></div></div>
          {w2 ? <div className="grid grid-cols-2 gap-3"><CfgNum label="Service commission %" value={(d.serviceCommissionBps || 0) / 100} suffix="%" onChange={(v) => setDraftField(t.id, { serviceCommissionBps: Math.round(v * 100) })} /><CfgNum label="Retail commission %" value={(d.retailCommissionBps || 0) / 100} suffix="%" onChange={(v) => setDraftField(t.id, { retailCommissionBps: Math.round(v * 100) })} /></div>
          : <div className="grid grid-cols-2 gap-3"><CfgNum label="Chair rent" value={(d.rentCents || 0) / 100} suffix="$" step="10" onChange={(v) => setDraftField(t.id, { rentCents: Math.round(v * 100) })} /><label className="block"><span className="mb-1 block text-xs font-medium text-gray-500">Rent cadence</span><select value={d.rentCadence || "WEEKLY"} onChange={(e) => setDraftField(t.id, { rentCadence: e.target.value })} className="w-full rounded-xl border border-gray-200 px-3 py-2 text-sm"><option value="WEEKLY">Weekly</option><option value="MONTHLY">Monthly</option></select></label></div>}
          <div className="mt-2 flex items-center justify-between gap-2"><span className="text-xs text-gray-400">{w2 ? "Hours tracked · paid via payroll export · min-wage + OT protected" : "No wage hours · instant payouts · flat rent"}</span><button onClick={() => { setPwOpen(pwOpen === t.id ? null : t.id); setPwVal(""); }} className="shrink-0 rounded-lg border border-gray-200 px-2.5 py-1 text-xs font-medium text-gray-600">{pwOpen === t.id ? "Cancel" : "Set login"}</button></div>
          {pwOpen === t.id && <div className="mt-2 flex items-center gap-2 rounded-lg bg-gray-50 p-2"><input type="text" value={pwVal} onChange={(e) => setPwVal(e.target.value)} placeholder="New password (min 6 chars)" className="w-full rounded-lg border border-gray-200 px-3 py-1.5 text-sm" /><button onClick={() => savePassword(t)} disabled={pwSaving} className="shrink-0 rounded-lg bg-purple-600 px-3 py-1.5 text-xs font-medium text-white disabled:opacity-40">{pwSaving ? "Saving…" : "Save login"}</button></div>}</div>; })}</div></Card>
    </div>
  );
}

const _root = document.getElementById("root");
_root.innerHTML = "";
ReactDOM.createRoot(_root).render(<SalonPOS />);
_root.setAttribute("data-ok", "1");
</script>
</body>
</html>
